name: CI

# "My CI blocks deploys that break SEO" (CLAUDE.md §8). Runs on every push to
# main and every pull request; a red run should block the merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A new push to the same branch cancels the superseded run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

  # Roadmap (CLAUDE.md §8): add jobs for the Playwright SEO regression suite and
  # Lighthouse CI performance budgets once those are wired up. They belong here
  # so CI fails when an SEO invariant or a Core Web Vitals budget regresses.
