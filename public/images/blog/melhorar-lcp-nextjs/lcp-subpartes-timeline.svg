<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Timeline das 4 subpartes do LCP: TTFB, resource load delay, resource load duration e element render delay. Os delays costumam dominar; o download raramente é o gargalo." font-family="Arial, Helvetica, sans-serif">
  <title>As 4 subpartes do LCP</title>
  <rect width="800" height="260" fill="#ffffff"/>

  <!-- Anotações superiores -->
  <text x="128" y="70" font-size="12" text-anchor="middle" fill="#111827">servidor responde</text>
  <text x="315" y="70" font-size="12" text-anchor="middle" fill="#111827">navegador descobre o recurso</text>
  <text x="485" y="70" font-size="12" text-anchor="middle" fill="#111827">bytes chegam</text>
  <text x="638" y="70" font-size="12" text-anchor="middle" fill="#111827">CSS libera a pintura</text>
  <line x1="128" y1="78" x2="128" y2="105" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <line x1="315" y1="78" x2="315" y2="105" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <line x1="485" y1="78" x2="485" y2="105" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <line x1="638" y1="78" x2="638" y2="105" stroke="#9CA3AF" stroke-dasharray="3 3"/>

  <!-- Fases (x proporcional: 680px úteis) -->
  <rect x="60" y="110" width="136" height="40" fill="#DBEAFE"/>
  <text x="128" y="135" font-size="14" text-anchor="middle" fill="#1a1a1a">TTFB</text>

  <rect x="196" y="110" width="238" height="40" fill="#F59E0B"/>
  <text x="315" y="135" font-size="14" text-anchor="middle" fill="#1a1a1a">Resource load delay</text>

  <rect x="434" y="110" width="102" height="40" fill="#D1FAE5"/>
  <text x="485" y="135" font-size="13" text-anchor="middle" fill="#1a1a1a">Download</text>

  <rect x="536" y="110" width="204" height="40" fill="#F59E0B"/>
  <text x="638" y="135" font-size="14" text-anchor="middle" fill="#1a1a1a">Element render delay</text>

  <!-- Eixo -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="#9CA3AF" stroke-width="2"/>
  <text x="60" y="180" font-size="13" fill="#111827">0</text>
  <text x="740" y="180" font-size="13" text-anchor="end" fill="#111827">LCP</text>

  <!-- Tese do artigo -->
  <text x="400" y="225" font-size="13" text-anchor="middle" fill="#111827">Os delays (em destaque) costumam dominar o LCP — o download raramente é o gargalo.</text>
</svg>
