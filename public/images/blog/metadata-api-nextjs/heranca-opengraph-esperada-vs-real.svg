<svg viewBox="0 0 720 330" width="720" height="330" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparação entre a herança esperada e a herança real do objeto openGraph entre root layout e página" font-family="Arial, Helvetica, sans-serif">
  <title>Herança esperada vs. herança real do openGraph</title>
  <desc>Duas colunas. À esquerda, a expectativa: o root layout com quatro chaves de openGraph mais uma chave definida na página resultariam em cinco chaves emitidas. À direita, o comportamento real: apenas a chave definida na página é emitida, e as quatro herdadas são descartadas.</desc>
  <rect x="0" y="0" width="720" height="330" fill="#ffffff"/>
  <text x="180" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">o que você espera</text>
  <text x="540" y="26" text-anchor="middle" font-size="14" font-weight="500" fill="#111827">o que acontece</text>

  <rect x="60" y="44" width="240" height="72" rx="8" fill="#DBEAFE" stroke="#9CA3AF" stroke-width="0.5"/>
  <text x="180" y="66" text-anchor="middle" font-size="12" fill="#111827">root layout: openGraph</text>
  <text x="180" y="86" text-anchor="middle" font-size="12" fill="#111827">siteName · locale · type · images</text>
  <text x="180" y="106" text-anchor="middle" font-size="12" fill="#111827">4 chaves</text>

  <rect x="420" y="44" width="240" height="72" rx="8" fill="#DBEAFE" stroke="#9CA3AF" stroke-width="0.5"/>
  <text x="540" y="66" text-anchor="middle" font-size="12" fill="#111827">root layout: openGraph</text>
  <text x="540" y="86" text-anchor="middle" font-size="12" fill="#111827">siteName · locale · type · images</text>
  <text x="540" y="106" text-anchor="middle" font-size="12" fill="#111827">descartado por inteiro</text>
  <line x1="440" y1="80" x2="640" y2="80" stroke="#F59E0B" stroke-width="2"/>

  <line x1="180" y1="116" x2="180" y2="146" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="540" y1="116" x2="540" y2="146" stroke="#9CA3AF" stroke-width="1.5"/>

  <rect x="60" y="146" width="240" height="52" rx="8" fill="#D1FAE5" stroke="#9CA3AF" stroke-width="0.5"/>
  <text x="180" y="168" text-anchor="middle" font-size="12" fill="#111827">página: openGraph</text>
  <text x="180" y="188" text-anchor="middle" font-size="12" fill="#111827">title · 1 chave</text>

  <rect x="420" y="146" width="240" height="52" rx="8" fill="#D1FAE5" stroke="#9CA3AF" stroke-width="0.5"/>
  <text x="540" y="168" text-anchor="middle" font-size="12" fill="#111827">página: openGraph</text>
  <text x="540" y="188" text-anchor="middle" font-size="12" fill="#111827">title · 1 chave</text>

  <line x1="180" y1="198" x2="180" y2="234" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="540" y1="198" x2="540" y2="234" stroke="#F59E0B" stroke-width="1.5"/>

  <rect x="60" y="234" width="240" height="56" rx="8" fill="#ffffff" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="180" y="258" text-anchor="middle" font-size="12" fill="#111827">emitido: 5 chaves</text>
  <text x="180" y="278" text-anchor="middle" font-size="12" fill="#111827">título novo, resto herdado</text>

  <rect x="420" y="234" width="240" height="56" rx="8" fill="#ffffff" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="540" y="258" text-anchor="middle" font-size="12" fill="#111827">emitido: 1 chave</text>
  <text x="540" y="278" text-anchor="middle" font-size="12" fill="#111827">só og:title</text>

  <text x="360" y="316" text-anchor="middle" font-size="13" fill="#111827">merge raso: o último segmento que define openGraph substitui o objeto inteiro</text>
</svg>
